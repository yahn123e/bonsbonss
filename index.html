<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For you</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ivory:  #fdf8f3;
      --blush:  #f5e6e8;
      --petal:  #e8c4cc;
      --rose:   #c47a8a;
      --dusty:  #a05a6e;
      --deep:   #6b3545;
      --text:   #4a2530;
      --muted:  #9e7a82;
    }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background-color: var(--ivory);
      background-image:
        radial-gradient(ellipse 70% 60% at 15% 10%, rgba(232,196,204,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 85% 85%, rgba(245,230,232,0.4) 0%, transparent 55%);
      font-family: 'EB Garamond', Georgia, serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .deco-line {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--petal) 30%, var(--rose) 50%, var(--petal) 70%, transparent);
      z-index: 10;
    }
    .deco-line-b {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--petal) 30%, var(--rose) 50%, var(--petal) 70%, transparent);
      z-index: 10;
    }

    .petals { position: fixed; inset: 0; pointer-events: none; z-index: 2; }

    .petal {
      position: absolute;
      bottom: -40px;
      opacity: 0;
      animation: drift linear infinite;
    }

    @keyframes drift {
      0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
      8%   { opacity: 0.5; }
      80%  { opacity: 0.25; }
      100% { transform: translateY(-105vh) translateX(var(--sway)) rotate(var(--spin)); opacity: 0; }
    }

    .stage {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 560px;
      padding: 2rem 1.5rem;
    }

    .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.68rem, 2vw, 0.76rem);
      font-weight: 300;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3rem;
      opacity: 0;
      animation: riseIn 1.2s cubic-bezier(.22,1,.36,1) 0.2s forwards;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .envelope-wrap {
      position: relative;
      cursor: pointer;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: riseIn 1.2s cubic-bezier(.22,1,.36,1) 0.5s forwards;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .envelope {
      width: clamp(180px, 48vw, 230px);
      aspect-ratio: 1.62 / 1;
      background: linear-gradient(165deg, #fff9f6 0%, #faeef1 100%);
      border: 1px solid var(--petal);
      border-radius: 2px;
      position: relative;
      transition: transform 0.4s cubic-bezier(.34,1.4,.64,1), box-shadow 0.4s ease;
      box-shadow:
        0 2px 20px rgba(160,90,110,0.10),
        inset 0 1px 0 rgba(255,255,255,0.85);
      overflow: hidden;
    }

    .envelope-wrap:hover .envelope {
      transform: translateY(-7px) rotate(-0.8deg);
      box-shadow:
        0 14px 44px rgba(160,90,110,0.16),
        inset 0 1px 0 rgba(255,255,255,0.85);
    }

    .flap {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 52%;
      background: linear-gradient(170deg, #f5e0e5 0%, #faeef2 65%);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      border-bottom: 1px solid rgba(232,196,204,0.5);
      transform-origin: top center;
      transition: transform 0.55s cubic-bezier(.34,1.1,.64,1);
      z-index: 2;
    }

    .envelope-wrap:hover .flap,
    .envelope-wrap.opened .flap {
      transform: perspective(500px) rotateX(165deg);
    }

    .flap-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 46%;
      background: linear-gradient(0deg, rgba(196,122,138,0.05) 0%, transparent 100%);
      clip-path: polygon(0 100%, 50% 0, 100% 100%);
    }

    .seal {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 42px; height: 42px;
      background: radial-gradient(circle at 38% 35%, #d4889a, var(--dusty) 65%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(107,53,69,0.28), inset 0 1px 0 rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.88);
      font-size: 17px;
      z-index: 3;
      transition: opacity 0.3s ease 0.2s;
      line-height: 1;
    }

    .envelope-wrap.opened .seal { opacity: 0; }

    .click-label {
      margin-top: 1.1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.66rem, 2vw, 0.72rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.3s, opacity 0.4s;
    }

    .envelope-wrap:hover .click-label { color: var(--dusty); }
    .envelope-wrap.opened .click-label { opacity: 0; }

    .message-card {
      width: 100%;
      background: linear-gradient(160deg, #fff9f6, #fdf0f3);
      border: 1px solid var(--petal);
      border-radius: 2px;
      padding: clamp(2rem, 6vw, 3.2rem) clamp(1.8rem, 5vw, 3rem);
      position: relative;
      opacity: 0;
      transform: translateY(22px) scale(0.98);
      transition: opacity 0.85s cubic-bezier(.22,1,.36,1), transform 0.85s cubic-bezier(.22,1,.36,1);
      display: none;
      box-shadow:
        0 4px 40px rgba(160,90,110,0.08),
        inset 0 1px 0 rgba(255,255,255,0.85);
    }

    .message-card.visible { display: block; }
    .message-card.shown   { opacity: 1; transform: translateY(0) scale(1); }

    .corner {
      position: absolute;
      width: 22px; height: 22px;
      border-color: var(--petal);
      border-style: solid;
      border-width: 0;
      opacity: 0.7;
    }
    .corner.tl { top: 12px; left: 12px; border-top-width: 1px; border-left-width: 1px; }
    .corner.tr { top: 12px; right: 12px; border-top-width: 1px; border-right-width: 1px; }
    .corner.bl { bottom: 12px; left: 12px; border-bottom-width: 1px; border-left-width: 1px; }
    .corner.br { bottom: 12px; right: 12px; border-bottom-width: 1px; border-right-width: 1px; }

    .open-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem;
      line-height: 0.65;
      color: var(--petal);
      display: block;
      margin-bottom: 0.8rem;
      font-weight: 300;
    }

    .message-card p {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(1.06rem, 3vw, 1.22rem);
      line-height: 1.95;
      color: var(--text);
      letter-spacing: 0.015em;
    }

    .cursor {
      display: inline-block;
      width: 1.5px;
      height: 1em;
      background: var(--rose);
      margin-left: 1px;
      vertical-align: baseline;
      position: relative;
      top: 2px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .divider {
      border: none;
      border-top: 1px solid var(--petal);
      margin: 1.5rem 0 0;
      opacity: 0.45;
    }

    .sign {
      display: block;
      margin-top: 1.1rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2.5vw, 1.08rem);
      font-weight: 300;
      color: var(--dusty);
      text-align: right;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.7s ease 0.5s, transform 0.7s ease 0.5s;
    }

    .message-card.shown .sign { opacity: 1; transform: translateY(0); }

    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      border-radius: 50%;
      animation: particleFly 1s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes particleFly {
      0%   { transform: translate(0,0) scale(1); opacity: 0.85; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="deco-line"></div>
  <div class="deco-line-b"></div>
  <div class="petals" id="petalsContainer"></div>

  <div class="stage">
    <p class="eyebrow">a little letter</p>

    <div class="envelope-wrap" id="envWrap" role="button" tabindex="0" aria-label="Open letter">
      <div class="envelope">
        <div class="flap"></div>
        <div class="flap-bottom"></div>
        <div class="seal">♡</div>
      </div>
      <p class="click-label">open me</p>
    </div>

    <div class="message-card" id="messageCard" aria-live="polite">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <span class="open-quote">"</span>
      <p id="typedText"></p>
      <hr class="divider" />
      <span class="sign">with love, always ♡</span>
    </div>
  </div>

  <script>
    const MESSAGE    = "I'm so proud of you. Keep going you're doing amazingly, and I believe in you always. I love you bonsbons!";
    const TYPE_SPEED = 44;
    const petalColors = ['#e8c4cc','#f0d4d8','#d4a0b0','#c8b4bc','#eedde0','#f5e6e8'];

    // Petals
    const petalContainer = document.getElementById('petalsContainer');
    for (let i = 0; i < 20; i++) {
      const el    = document.createElement('div');
      el.className = 'petal';
      const color  = petalColors[Math.floor(Math.random() * petalColors.length)];
      const r      = 5 + Math.random() * 7;
      el.innerHTML = `<svg width="${r*2}" height="${r*2.6}" viewBox="0 0 ${r*2} ${r*2.6}" xmlns="http://www.w3.org/2000/svg"><ellipse cx="${r}" cy="${r*1.3}" rx="${r}" ry="${r*1.3}" fill="${color}" opacity="0.65"/></svg>`;
      el.style.left = Math.random() * 100 + 'vw';
      el.style.setProperty('--sway', (Math.random() * 80 - 40) + 'px');
      el.style.setProperty('--spin', (Math.random() * 360) + 'deg');
      const dur = 11 + Math.random() * 12;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay   = -(Math.random() * dur) + 's';
      petalContainer.appendChild(el);
    }

    // Typing
    function typeText(text, el, onDone) {
      el.innerHTML = '';
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      el.appendChild(cursor);
      let i = 0;
      const t = setInterval(() => {
        if (i < text.length) {
          el.insertBefore(document.createTextNode(text[i++]), cursor);
        } else {
          clearInterval(t);
          setTimeout(() => { cursor.remove(); if (onDone) onDone(); }, 800);
        }
      }, TYPE_SPEED);
    }

    // Particles
    function burst(x, y) {
      const colors = ['#c47a8a','#a05a6e','#e8c4cc','#d4a0b0','#e0b0bc','#f0d4d8'];
      for (let i = 0; i < 18; i++) {
        const p   = document.createElement('div');
        p.className = 'particle';
        const a   = Math.random() * Math.PI * 2;
        const d   = 55 + Math.random() * 85;
        const sz  = (3 + Math.random() * 5) + 'px';
        p.style.cssText = `left:${x}px;top:${y}px;width:${sz};height:${sz};background:${colors[Math.floor(Math.random()*colors.length)]};`;
        p.style.setProperty('--dx', Math.cos(a) * d + 'px');
        p.style.setProperty('--dy', Math.sin(a) * d + 'px');
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    // Reveal
    let opened = false;
    const envWrap     = document.getElementById('envWrap');
    const messageCard = document.getElementById('messageCard');
    const typedText   = document.getElementById('typedText');

    function reveal(e) {
      if (opened) return;
      opened = true;
      const cx = e.clientX || window.innerWidth / 2;
      const cy = e.clientY || window.innerHeight / 2;
      burst(cx, cy);
      envWrap.classList.add('opened');

      setTimeout(() => {
        envWrap.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        envWrap.style.opacity    = '0';
        envWrap.style.transform  = 'translateY(-12px)';
      }, 500);

      setTimeout(() => {
        envWrap.style.display = 'none';
        messageCard.classList.add('visible');
        requestAnimationFrame(() => requestAnimationFrame(() => {
          messageCard.classList.add('shown');
          typeText(MESSAGE, typedText);
        }));
      }, 980);
    }

    envWrap.addEventListener('click', reveal);
    envWrap.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); reveal(e); }
    });
  </script>
</body>
</html>
